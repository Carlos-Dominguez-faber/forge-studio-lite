<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: "Geist";
    src: url("https://cdn.jsdelivr.net/npm/geist@1.5.1/dist/fonts/geist-sans/Geist-Variable.woff2") format("woff2-variations");
    font-weight: 100 900;
    font-display: swap;
  }
  @font-face {
    font-family: "Geist Mono";
    src: url("https://cdn.jsdelivr.net/npm/geist@1.5.1/dist/fonts/geist-mono/Geist-Mono-Variable.woff2") format("woff2-variations");
    font-weight: 100 900;
    font-display: swap;
  }
  :root {
    --bg: #0B0F1A;
    --surface: #151B2B;
    --primary: #2563EB;
    --primary-deep: #1E40AF;
    --accent: #60A5FA;
    --text: #FFFFFF;
    --muted: #94A3B8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px; height: 1080px;
    background: var(--bg); color: var(--text);
    overflow: hidden;
    font-family: "Geist", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .slide {
    width: 1080px; height: 1080px;
    padding: 96px;
    display: flex; flex-direction: column; justify-content: center;
    position: relative;
    background:
      radial-gradient(120% 90% at 12% 8%, rgba(37,99,235,0.16) 0%, rgba(37,99,235,0) 46%),
      var(--bg);
  }
  /* accent bar bottom */
  .slide::after {
    content: ""; position: absolute; left: 0; bottom: 0;
    width: 100%; height: 10px;
    background: linear-gradient(90deg, var(--primary-deep), var(--primary) 45%, var(--accent));
  }
  .kicker {
    font-family: "Geist Mono", monospace;
    font-size: 26px; font-weight: 600;
    letter-spacing: 5px; text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 56px;
    display: flex; align-items: center; gap: 22px;
  }
  .kicker::before {
    content: ""; width: 64px; height: 3px;
    background: var(--primary); display: inline-block;
  }
  .headline {
    font-size: 112px; font-weight: 800;
    line-height: 1.02; letter-spacing: -3px;
    max-width: 15ch;
  }
  .headline .hl { color: var(--primary); }
  .swipe {
    position: absolute; left: 96px; bottom: 72px;
    font-family: "Geist Mono", monospace;
    font-size: 30px; font-weight: 500;
    color: var(--muted); letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="kicker">3 errores al hacer carruseles</div>
    <h1 class="headline">Tu carrusel no retiene por el diseño. Retiene por la <span class="hl">estructura</span>.</h1>
    <div class="swipe">Desliza &rarr;</div>
  </div>
</body>
</html>
