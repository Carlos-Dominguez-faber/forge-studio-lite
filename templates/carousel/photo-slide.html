<!doctype html>
<!--
  /carrusel — PHOTO SLIDE template (foto full-bleed + gradiente de marca al frente).

  Cómo usar:
   1. Copia este archivo a <project>/slides/source/slide-NN.html y edita el copy.
   2. Pon la foto por BARE FILENAME del banco brand/photos/ (sin ruta):
        <img class="photo" src="founder.png" />
      El pipeline (carousel.ts → resolveBankPhotos) la copia sola al source dir
      antes de screenshootear — funciona desde cualquier ruta del proyecto.
   3. Capas al frente de la foto (en orden): .duotone (wash de marca) → .fade
      (oscurecido inferior para legibilidad del texto) → .grain (ruido sutil).
   4. Ajusta object-position de .photo para encuadrar la cara/sujeto.

  Self-contained: tokens inline (no link externo a brand.css — cada slide debe
  funcionar desde cualquier ruta). Mantén los valores en sync con brand/brand.css.
-->
<html lang="es">
<head>
<meta charset="UTF-8" />
<style>
  :root {
    --bg: #0B0F1A; --surface: #151B2B;
    --primary: #2563EB; --primary-deep: #1E40AF; --accent: #60A5FA;
    --secondary: #1E293B; --text: #FFFFFF; --muted: #94A3B8;
  }
  @font-face {
    font-family: 'Geist';
    font-style: normal; font-weight: 100 900; font-display: block;
    src: url('https://cdn.jsdelivr.net/npm/geist@1.5.1/dist/fonts/geist-sans/Geist-Variable.woff2') format('woff2-variations');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px; height: 1080px;
    background: var(--bg); color: var(--text);
    font-family: 'Geist', -apple-system, sans-serif;
    overflow: hidden; -webkit-font-smoothing: antialiased;
  }
  .slide { position: relative; width: 1080px; height: 1080px; overflow: hidden; }

  /* 1. Foto full-bleed. object-position encuadra al sujeto. */
  .photo {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; object-position: 50% 30%;
    filter: contrast(1.05) saturate(0.85);
  }
  /* 2. Duotone — gradientes de marca AL FRENTE de la foto (la "tiñen"). */
  .duotone {
    position: absolute; inset: 0; pointer-events: none;
    background:
      linear-gradient(180deg, rgba(37,99,235,0.15) 0%, transparent 30%),
      radial-gradient(ellipse at 80% 10%, rgba(37,99,235,0.45) 0%, transparent 55%),
      linear-gradient(195deg, rgba(30,64,175,0.25) 0%, transparent 50%);
    mix-blend-mode: screen;
  }
  /* 3. Fade inferior — garantiza legibilidad del texto sobre cualquier foto. */
  .fade {
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(180deg,
      transparent 0%, transparent 38%,
      rgba(11,15,26,0.55) 60%, rgba(11,15,26,0.92) 82%, var(--bg) 100%);
  }
  /* 4. Grain — ruido sutil, mata el look "plano AI". */
  .grain {
    position: absolute; inset: 0; pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.4'/></svg>");
    opacity: 0.10; mix-blend-mode: overlay;
  }

  .content { position: absolute; left: 96px; right: 96px; bottom: 96px; }
  .badge {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 10px 18px; margin-bottom: 28px;
    border: 1px solid rgba(37,99,235,0.6); border-radius: 999px;
    background: rgba(37,99,235,0.10); backdrop-filter: blur(6px);
    font-size: 18px; font-weight: 600; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--accent);
  }
  .badge .num { color: var(--primary); font-variant-numeric: tabular-nums; }
  .title {
    font-size: 92px; font-weight: 700; line-height: 0.98;
    letter-spacing: -0.035em; color: var(--text);
    margin-bottom: 28px; max-width: 880px;
  }
  .title b { color: var(--primary); }
  .body {
    font-size: 32px; font-weight: 400; line-height: 1.35;
    color: rgba(255,255,255,0.78); max-width: 820px;
  }
  .body em { color: var(--accent); font-style: normal; font-weight: 600; }
</style>
</head>
<body>
  <div class="slide">
    <img class="photo" src="{{PHOTO_FILENAME}}" alt="" />
    <div class="duotone"></div>
    <div class="fade"></div>
    <div class="grain"></div>
    <div class="content">
      <div class="badge"><span class="num">{{NUM}}</span> · {{KICKER}}</div>
      <div class="title">{{TITLE_HTML}}</div>
      <div class="body">{{BODY_HTML}}</div>
    </div>
  </div>
</body>
</html>
